name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          check-latest: true
      - name: Unit tests and static analysis
        run: |
          go vet ./...
          go test -race ./...
      - name: Redis integration test
        run: REDIS_URL=redis://localhost:6379/15 go test -race -tags=integration ./internal/limiter
      - name: Container build
        run: docker build --tag redis-token-gate:ci .

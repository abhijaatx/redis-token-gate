services:
  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    security_opt:
      - no-new-privileges:true

  redis-token-gate:
    build: .
    environment:
      REDIS_URL: redis://redis:6379/0
      DEFAULT_CAPACITY: "10"
      REFILL_PER_SECOND: "1"
      MAX_COST: "10"
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  redis-data:
